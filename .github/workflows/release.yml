name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - target: x86_64-apple-darwin
            os: macos-latest
            name: vibecheck-darwin-x86_64
          - target: aarch64-apple-darwin
            os: macos-latest
            name: vibecheck-darwin-arm64
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            name: vibecheck-linux-x86_64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Rename binary
        run: cp target/${{ matrix.target }}/release/vibecheck ${{ matrix.name }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: ${{ matrix.name }}

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/vibecheck-darwin-x86_64/vibecheck-darwin-x86_64
            artifacts/vibecheck-darwin-arm64/vibecheck-darwin-arm64
            artifacts/vibecheck-linux-x86_64/vibecheck-linux-x86_64
          generate_release_notes: true
