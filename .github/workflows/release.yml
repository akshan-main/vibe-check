name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - target: x86_64-apple-darwin
            os: macos-latest
            name: vibecheck-darwin-x86_64
          - target: aarch64-apple-darwin
            os: macos-latest
            name: vibecheck-darwin-arm64
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            name: vibecheck-linux-x86_64
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            name: vibecheck-linux-arm64
            cross: true
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            name: vibecheck-windows-x86_64.exe

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross (Linux ARM64)
        if: matrix.cross
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Build (cross)
        if: matrix.cross
        run: cross build --release --target ${{ matrix.target }}

      - name: Build (native)
        if: ${{ !matrix.cross }}
        run: cargo build --release --target ${{ matrix.target }}

      - name: Rename binary (unix)
        if: runner.os != 'Windows'
        run: cp target/${{ matrix.target }}/release/vibecheck ${{ matrix.name }}

      - name: Rename binary (windows)
        if: runner.os == 'Windows'
        run: cp target/${{ matrix.target }}/release/vibecheck.exe ${{ matrix.name }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: ${{ matrix.name }}

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/vibecheck-darwin-x86_64/vibecheck-darwin-x86_64
            artifacts/vibecheck-darwin-arm64/vibecheck-darwin-arm64
            artifacts/vibecheck-linux-x86_64/vibecheck-linux-x86_64
            artifacts/vibecheck-linux-arm64/vibecheck-linux-arm64
            artifacts/vibecheck-windows-x86_64.exe/vibecheck-windows-x86_64.exe
          generate_release_notes: true
